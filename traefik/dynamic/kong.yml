# ==========================================================================
# Traefik Dynamic Configuration — Kong Catch-All + OIDC ForwardAuth
# ==========================================================================
# Forwards all traffic to Kong API Gateway at priority 1 (lowest).
# Higher-priority routes (e.g. Traefik dashboard, Kong admin via labels) take
# precedence. OIDC ForwardAuth delegates auth to oauth2-proxy.
#
# ForwardAuth points at the oauth2-proxy root (not /oauth2/auth) so that
# unauthenticated requests receive a proper 302 redirect to Keycloak
# (with Set-Cookie for CSRF) instead of a bare 401. This requires
# oauth2-proxy to run with OAUTH2_PROXY_UPSTREAMS=static://202 so that
# authenticated requests return 202 (the ForwardAuth "allow" signal).
#
# Note: the Kong admin router (gw-admin) is defined via Docker labels on the
# kong service in docker-compose.yml so it can reference the KONG_ADMIN_DOMAIN
# environment variable without hardcoding a domain here.
# ==========================================================================

http:
  routers:
    kong-catchall:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
        - websecure
      service: kong-proxy
      priority: 1

  middlewares:
    oidc-auth:
      forwardAuth:
        address: "http://oauth2-proxy:4180/"
        trustForwardHeader: true
        authResponseHeaders:
          - "X-Auth-Request-User"
          - "X-Auth-Request-Email"
          - "X-Auth-Request-Access-Token"

  services:
    kong-proxy:
      loadBalancer:
        servers:
          - url: "http://kong:8000"
        healthCheck:
          path: /status
          port: 8001
          interval: 30s
          timeout: 5s
