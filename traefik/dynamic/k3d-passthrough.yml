# =============================================================================
# Traefik Dynamic Configuration — k3d In-Cluster Passthrough
# =============================================================================
# Routes app-zone traffic from the outer (Docker) Traefik to the in-cluster
# Traefik running inside the k3d LoadBalancer container.
#
# App zones (three wildcard domains):
#   *.apps.<DOMAIN>         — prod  (no env prefix)
#   *.stg.apps.<DOMAIN>     — staging
#   *.dev.apps.<DOMAIN>     — development
#
# How it works:
#   1. Outer Traefik matches Host headers for the three zones via HostRegexp.
#   2. Traffic is forwarded to k3d-dsoaas-serverlb:8444 (host :8444 maps to
#      in-cluster Traefik :443).  The inner Traefik then routes by Ingress host.
#   3. Priority 10 — higher than the Kong catch-all (priority 1) so these
#      routes take precedence for app-zone hostnames.
#   4. TLS is terminated at the outer Traefik; the in-cluster Traefik receives
#      plain HTTP on its :80 listener (outer port 8081 / inner port 8000).
#      Using HTTP forwarding avoids cert complexity inside the cluster.
#
# __DOMAIN__ placeholder is substituted at container startup by the traefik
# entrypoint sed command (same mechanism as traefik.yml).
# =============================================================================

http:
  routers:
    # -------------------------------------------------------------------------
    # prod zone: *.apps.<DOMAIN>
    # -------------------------------------------------------------------------
    k3d-prod:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.apps.__DOMAIN__`)"
      entryPoints:
        - websecure
      service: k3d-ingress
      priority: 10

    # -------------------------------------------------------------------------
    # staging zone: *.stg.apps.<DOMAIN>
    # -------------------------------------------------------------------------
    k3d-stg:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.stg.apps.__DOMAIN__`)"
      entryPoints:
        - websecure
      service: k3d-ingress
      priority: 10

    # -------------------------------------------------------------------------
    # dev zone: *.dev.apps.<DOMAIN>
    # -------------------------------------------------------------------------
    k3d-dev:
      rule: "HostRegexp(`{subdomain:[a-z0-9-]+}.dev.apps.__DOMAIN__`)"
      entryPoints:
        - websecure
      service: k3d-ingress
      priority: 10

  services:
    # -------------------------------------------------------------------------
    # Target: in-cluster Traefik via k3d LoadBalancer (HTTP)
    # The LB container is reachable inside devops-network by its Docker
    # hostname: k3d-dsoaas-serverlb.  Port 8081 on the host maps to
    # in-cluster Traefik :80.
    # -------------------------------------------------------------------------
    k3d-ingress:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://k3d-dsoaas-serverlb:8081"
        healthCheck:
          path: /ping
          interval: 30s
          timeout: 5s
