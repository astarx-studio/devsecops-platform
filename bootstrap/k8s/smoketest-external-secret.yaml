# =============================================================================
# Smoke-test ExternalSecret — Phase 2 validation only
# =============================================================================
# References secret/data/projects/_smoketest/dev in Vault via the vault-backend
# ClusterSecretStore. If this materialises as a K8s Secret with key "foo"="bar"
# the entire ESO → Vault K8s auth pipeline is verified end-to-end.
#
# Cleanup after validation:
#   kubectl delete externalsecret smoketest-secret -n dev
#   kubectl delete secret smoketest-secret -n dev
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: smoketest-secret
  namespace: dev
  labels:
    app.kubernetes.io/managed-by: dsoaas-smoketest
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: smoketest-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: projects/_smoketest/dev
