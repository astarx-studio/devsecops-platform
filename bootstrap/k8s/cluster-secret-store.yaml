# =============================================================================
# ClusterSecretStore: vault-backend
# =============================================================================
# Cluster-wide secret store that allows any namespace's ExternalSecret to read
# from Vault using Kubernetes service account authentication (eso-reader role).
#
# Vault auth flow:
#   ESO pod (SA: external-secrets, ns: eso-system)
#     → authenticates to Vault auth/kubernetes/ using its projected SA token
#     → Vault verifies token against k3d API server
#     → Vault issues short-lived token (TTL 1h) bound to app-secrets-read policy
#     → ESO reads secret/data/projects/** on behalf of ExternalSecret resources
#
# Prerequisites (applied by bootstrap/vault-k8s-auth.sh):
#   - Vault kubernetes auth enabled: vault auth enable kubernetes
#   - auth/kubernetes/config set with k3d CA + API URL
#   - policy: app-secrets-read
#   - role: eso-reader (bound to eso-system/external-secrets SA, TTL 1h)
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  labels:
    app.kubernetes.io/managed-by: dsoaas-bootstrap
spec:
  provider:
    vault:
      # Vault is reachable inside devops-network by Docker hostname.
      # k3d CoreDNS NodeHosts includes the vault container entry.
      server: "http://vault:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          # Vault role that maps ESO's SA to the app-secrets-read policy
          role: "eso-reader"
          # Use ESO's own mounted service account token for authentication
          serviceAccountRef:
            name: "external-secrets"
            namespace: "eso-system"
