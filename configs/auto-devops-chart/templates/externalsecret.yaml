{{- if .Values.externalSecret.enabled }}
{{- if and .Values.project.path .Values.project.env }}
# ExternalSecret: pulls all keys from Vault path
#   secret/data/<project.path>/<project.env>
# where project.path is the full Vault path (e.g. projects/demo/demo-api).
# Materialises them as a K8s Secret named after the Helm release.
# The Deployment mounts this Secret via envFrom.secretRef.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "dsoaas-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dsoaas-app.labels" . | nindent 4 }}
spec:
  # Refresh every 5 minutes; the Deployment checksum annotation forces a
  # rollout whenever a new pod is scheduled after a secret rotation.
  refreshInterval: "5m"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ include "dsoaas-app.secretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        # project.path is the full Vault path supplied by the pipeline via
        # --set project.path=$VAULT_PROJECT_PATH (e.g. projects/demo/demo-api).
        # Do NOT add a leading "projects/" here — the path already includes it.
        key: "{{ .Values.project.path }}/{{ .Values.project.env }}"
{{- else }}
{{- fail "externalSecret.enabled requires project.path and project.env" }}
{{- end }}
{{- end }}
