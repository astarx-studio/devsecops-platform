apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dsoaas-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dsoaas-app.labels" . | nindent 4 }}
  annotations:
    # Stakater Reloader watches the Deployment resource for this annotation
    # (not the pod template) and triggers a rolling restart whenever a
    # referenced K8s Secret or ConfigMap changes — i.e. when ESO syncs new
    # values from Vault into the Secret consumed via envFrom.
    reloader.stakater.com/auto: "true"
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "dsoaas-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dsoaas-app.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "dsoaas-app.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          # All app secrets sourced from the ExternalSecret-backed K8s Secret
          envFrom:
            - secretRef:
                name: {{ include "dsoaas-app.secretName" . }}
                optional: false
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
