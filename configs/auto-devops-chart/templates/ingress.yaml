{{- if .Values.ingress.enabled }}
{{- if not .Values.ingress.host }}
{{- fail "ingress.host is required; set via --set ingress.host=$APP_HOST" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dsoaas-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dsoaas-app.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Routes traffic via the in-cluster Traefik instance.
  # TLS is terminated at the outer (Docker) Traefik; no TLS block here.
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dsoaas-app.fullname" . }}
                port:
                  name: http
{{- end }}
