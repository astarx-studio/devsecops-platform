# =============================================================================
# DSOaaS Auto DevOps Pipeline
# =============================================================================
# Include this file from your app's .gitlab-ci.yml:
#
#   include:
#     - project: "configs/auto-devops-pipeline"
#       file: "/.gitlab-ci.yml"
#
# Pipeline stages:
#   build  → Kaniko image build + push to GitLab Container Registry
#   test   → (placeholder; extend per-app as needed)
#   deploy → helm upgrade --install into the target k3d namespace
#
# Required CI variables (set by Management API at project creation):
#   KUBE_NAMESPACE        Kubernetes namespace  (dev | stg | prod)
#   APP_HOST              Ingress hostname       (e.g. myapp.dev.apps.<D>)
#   VAULT_PROJECT_PATH    Vault secret path      (e.g. external/kai/esa/myapp)
#   VAULT_ADDR            Vault API URL (global; set by Management API)
#   VAULT_TOKEN           Read token for env profiles (global; masked)
#   KUBECONFIG_B64        Base64-encoded kubeconfig scoped to $KUBE_NAMESPACE
#
# Optional overrides (project-level CI variables):
#   KANIKO_DOCKERFILE     Dockerfile path relative to repo root (default: Dockerfile)
#   KANIKO_IMAGE_NAME     Optional registry path suffix for monorepos, e.g. "admin"
#                         → pushes to $CI_REGISTRY_IMAGE/admin:$CI_COMMIT_SHORT_SHA
#   CHART_VERSION         Pin a chart version  (default: latest stable)
#   CHART_REGISTRY_HOST   Helm OCI host (default gitlab:5000 in-stack; external: GITLAB_REGISTRY_DOMAIN)
#   CHART_REGISTRY_PLAIN_HTTP  auto | true | false
#   CHART_REGISTRY_USER / CHART_REGISTRY_PASSWORD  Deploy token on auto-devops-chart (instance CI)
#   EXTRA_HELM_ARGS       Pass extra --set flags to helm upgrade
#   DEPLOY_DEV_REF        Branch that triggers dev deploy (default: develop)
#   DEPLOY_STG_REF        Branch that triggers stg deploy (default: staging)
#   DEPLOY_PROD_REF       Branch that triggers prod deploy (default: main)
#   DEPLOY_<KEY>_REF      Per-target refs for custom targets (e.g. DEPLOY_PROD_ALT_REF)
#
#   Set any DEPLOY_*_REF to "none" (only this value) to disable deploy jobs for that target.
#   The Management API sets "none" when a target is disabled.
#
# Optional SonarQube (opt-in per project — set via Management API or GitLab CI variables):
#   SONAR_ALLOWED_BRANCHES   Comma-separated branch names (empty = skip Sonar)
#   SONAR_TOKEN              Masked analysis token
#   SONAR_HOST_URL           Public Sonar URL (dashboard links; scanner fallback on external runners)
#   SONAR_HOST_URL_INTERNAL  Scanner URL in-stack (default http://sonarqube:9000 on devops-network)
#   SONAR_GATE_POLICY_JSON   {"dev":"optional","stg":"required","prod":"required","other":"optional"}
# =============================================================================

# =============================================================================
# Security scan templates (Option C — cherry-pick)
# =============================================================================
# SAST, Secret Detection, and Container Scanning cover the highest-value
# automated security coverage available on GitLab Free / self-hosted CE.
# Findings surface in the project's Security & Compliance → Vulnerability
# Report.  Scans are advisory by default; they do not block deploys unless
# explicitly configured.
# =============================================================================
include:
  - local: ci/load-vault-env.yml
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

# =============================================================================
# Workflow guard
# =============================================================================
# This file is a *CI template* meant to be `include:`d by app projects.
# When that happens, GitLab evaluates rules against the *including* project's
# context, so the jobs below run there as expected.
#
# However, if someone pushes a commit directly to the auto-devops-pipeline
# repo itself, GitLab will also process its own .gitlab-ci.yml and try to run
# the build/test/deploy jobs — which fail (no Dockerfile, no kubeconfig, etc.).
# Suppress that case entirely via a workflow rule.
# =============================================================================
workflow:
  rules:
    - if: '$CI_PROJECT_PATH == "system/devsecops-platform/configs/auto-devops-pipeline"'
      when: never
    - when: always

variables:
  # Disable Auto DevOps built-in Kubernetes deploy (we handle it ourselves)
  AUTO_DEVOPS_PLATFORM_TARGET: ""
  # Helm OCI chart registry host (override at instance level for external runners).
  # In-stack default: gitlab:5000 (registry daemon on devops-network).
  # External runners: set CHART_REGISTRY_HOST to GITLAB_REGISTRY_DOMAIN (HTTPS via Traefik).
  CHART_REGISTRY_HOST: "gitlab:5000"
  # auto | true | false — auto uses plain HTTP only for gitlab:5000
  CHART_REGISTRY_PLAIN_HTTP: "auto"
  CHART_VERSION: "0.2.3"
  # Kaniko cache bucket inside GitLab registry
  DOCKER_DRIVER: overlay2
  # Container-Scanning target — the image built and pushed by Kaniko.
  # Without this, the template defaults to Auto DevOps vars that are not set
  # in this pipeline and the scan would error or scan nothing.
  CS_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  # Branch refs controlling auto-deploys (can be overridden per project)
  DEPLOY_DEV_REF: "develop"
  DEPLOY_STG_REF: "staging"
  DEPLOY_PROD_REF: "main"
  SONAR_HOST_URL_INTERNAL: "http://sonarqube:9000"
  SONAR_SCANNER_IMAGE: "sonarsource/sonar-scanner-cli:11"

stages:
  - build
  - test
  - deploy

# Vault env loader: see ci/load-vault-env.yml (embedded script; no cross-project API fetch).

# =============================================================================
# prepare-build-env — load Vault BUILD profiles (Debian; avoids Alpine CDN issues on runners).
# =============================================================================
prepare-build-env:
  stage: build
  image: debian:bookworm-slim
  variables:
    DSOAAS_LOAD_ALL_BUILD_PROFILES: "true"
  before_script:
    - !reference [.load-vault-env, before_script]
  script:
    - echo "prepare-build-env done (${CI_PROJECT_DIR})"
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - .dsoaas/
  rules:
    - if: '$CI_COMMIT_BRANCH'

# =============================================================================
# .build-kaniko — Kaniko executor (native image). Env files come from prepare-build-env.
# =============================================================================
.build-kaniko:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs:
    - job: prepare-build-env
      artifacts: true
  variables:
    KANIKO_DOCKERFILE: "Dockerfile"
    KANIKO_IMAGE_NAME: ""
  script:
    - |
      set -eu
      mkdir -p /kaniko/.docker
      echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(echo -n "${CI_REGISTRY_USER}:${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" \
        > /kaniko/.docker/config.json
      IMAGE_BASE="${CI_REGISTRY_IMAGE}"
      if [ -n "${KANIKO_IMAGE_NAME:-}" ]; then
        IMAGE_BASE="${CI_REGISTRY_IMAGE}/${KANIKO_IMAGE_NAME}"
      fi
      KANIKO_DEST_SHA="${IMAGE_BASE}:${CI_COMMIT_SHORT_SHA}"
      KANIKO_DEST_LATEST="${IMAGE_BASE}:latest"
      KANIKO_CACHE_REPO="${IMAGE_BASE}/cache"
      echo "Kaniko image base: ${IMAGE_BASE} (dockerfile=${KANIKO_DOCKERFILE})"
      KANIKO_EXTRA=""
      KANIKO_ARGS_SUFFIX=""
      if [ -n "${KANIKO_IMAGE_NAME:-}" ]; then
        KANIKO_ARGS_SUFFIX="-${KANIKO_IMAGE_NAME}"
      fi
      KANIKO_BUILD_ARGS_FILE="${CI_PROJECT_DIR}/.dsoaas/kaniko-extra-build-args${KANIKO_ARGS_SUFFIX}"
      if [ -f "${KANIKO_BUILD_ARGS_FILE}" ]; then
        KANIKO_EXTRA=$(tr '\n' ' ' < "${KANIKO_BUILD_ARGS_FILE}")
      fi
      STAGED_WS="${CI_PROJECT_DIR}/.dsoaas/staged-workspace"
      if [ -d "${STAGED_WS}" ]; then
        cp -a "${STAGED_WS}/." "${CI_PROJECT_DIR}/"
        echo "Applied BUILD raw_file profile(s) from prepare-build-env artifacts"
      fi
      # shellcheck disable=SC2086
      /kaniko/executor \
        --context="${CI_PROJECT_DIR}" \
        --dockerfile="${KANIKO_DOCKERFILE}" \
        --destination="${KANIKO_DEST_SHA}" \
        --destination="${KANIKO_DEST_LATEST}" \
        --cache=true \
        --cache-copy-layers=false \
        --cache-repo="${KANIKO_CACHE_REPO}" \
        ${KANIKO_EXTRA}
  rules:
    - if: '$CI_COMMIT_BRANCH'

# Concrete build job
build:
  extends: .build-kaniko

# =============================================================================
# .test-placeholder — override in your .gitlab-ci.yml to add real tests.
# =============================================================================
test:
  stage: test
  image: alpine:3.20
  before_script:
    - !reference [.load-vault-env, before_script]
  script:
    - echo "No tests defined — override this job in your .gitlab-ci.yml"
  rules:
    - if: '$CI_COMMIT_BRANCH'

# =============================================================================
# SonarQube — static analysis (opt-in via SONAR_ALLOWED_BRANCHES + SONAR_TOKEN)
#
# Runs in the test stage with no job dependencies so it is not skipped when a
# project's `test` job fails. Do not add `needs: [test]` unless you also set
# optional: true on that need, or Sonar will be skipped on test failure.
# =============================================================================
.sonar-scan:
  stage: test
  image:
    name: ${SONAR_SCANNER_IMAGE}
    entrypoint: [""]
  variables:
    GIT_DEPTH: "0"
  script:
    - |
      set -euo pipefail
      if [ -z "${SONAR_ALLOWED_BRANCHES:-}" ] || [ -z "${SONAR_TOKEN:-}" ]; then
        echo "Sonar skipped: set SONAR_ALLOWED_BRANCHES and SONAR_TOKEN to enable analysis."
        exit 0
      fi
      ALLOWED=",$SONAR_ALLOWED_BRANCHES,"
      if ! echo "$ALLOWED" | grep -q ",${CI_COMMIT_REF_NAME},"; then
        echo "Sonar skipped: branch ${CI_COMMIT_REF_NAME} not in SONAR_ALLOWED_BRANCHES."
        exit 0
      fi
      SONAR_PUBLIC_URL="${SONAR_HOST_URL:-}"
      SCAN_URL="${SONAR_HOST_URL_INTERNAL:-http://sonarqube:9000}"
      # External runners cannot resolve in-cluster sonarqube; use public URL via host gateway.
      if ! curl -sf --max-time 5 "${SCAN_URL}/api/system/status" >/dev/null 2>&1; then
        if [ -n "${SONAR_PUBLIC_URL}" ]; then
          SCAN_URL="${SONAR_PUBLIC_URL}"
          _sonar_host="$(printf '%s' "${SONAR_PUBLIC_URL}" | sed -e 's#^https://##' -e 's#^http://##' -e 's#/.*##' -e 's#:.*##')"
          if [ -n "${_sonar_host}" ] && command -v getent >/dev/null 2>&1 \
              && getent ahostsv4 host.docker.internal >/dev/null 2>&1; then
            _gw="$(getent ahostsv4 host.docker.internal | awk '{print $1; exit}')"
            echo "${_gw} ${_sonar_host}" >> /etc/hosts
            echo "Sonar scanner: mapped ${_sonar_host} -> host.docker.internal (${_gw})"
          fi
        fi
      fi
      PROJECT_KEY="${CI_PROJECT_PATH_SLUG}_${CI_COMMIT_REF_SLUG}"
      # printf avoids echo's trailing newline (was turned into a stray '_' by tr)
      PROJECT_KEY=$(printf '%s' "$PROJECT_KEY" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9._-' '_' | sed 's/^_\+//;s/_\+$//')
      export SONAR_HOST_URL="$SCAN_URL"
      export SONAR_TOKEN
      TIER=other
      if [ "${CI_COMMIT_REF_NAME}" = "${DEPLOY_DEV_REF}" ]; then TIER=dev
      elif [ "${CI_COMMIT_REF_NAME}" = "${DEPLOY_STG_REF}" ]; then TIER=stg
      elif [ "${CI_COMMIT_REF_NAME}" = "${DEPLOY_PROD_REF}" ]; then TIER=prod
      fi
      GATE_MODE=optional
      if [ -n "${SONAR_GATE_POLICY_JSON:-}" ]; then
        GATE_MODE=$(echo "$SONAR_GATE_POLICY_JSON" | tr -d ' ' | sed -n "s/.*\"${TIER}\":\"\([^\"]*\)\".*/\1/p")
        [ -z "$GATE_MODE" ] && GATE_MODE=optional
      fi
      echo "Sonar tier=${TIER} gate=${GATE_MODE} projectKey=${PROJECT_KEY}"
      SCANNER_EXTRA="-Dsonar.sources=."
      [ -f sonar-project.properties ] && SCANNER_EXTRA=""
      sonar-scanner \
        -Dsonar.projectKey="${PROJECT_KEY}" \
        -Dsonar.projectName="${CI_PROJECT_NAME} (${CI_COMMIT_REF_NAME})" \
        -Dsonar.qualitygate.wait=false \
        ${SCANNER_EXTRA}
      DASHBOARD="${SONAR_PUBLIC_URL:-$SCAN_URL}/dashboard?id=${PROJECT_KEY}"
      STATUS=success
      DESCRIPTION="Sonar Quality Gate passed (${TIER}, ${GATE_MODE})"
      if [ "$GATE_MODE" = "required" ]; then
        if ! curl -sf -u "${SONAR_TOKEN}:" \
          "${SCAN_URL}/api/qualitygates/project_status?projectKey=${PROJECT_KEY}" \
          | grep -q '"status":"OK"'; then
          STATUS=failed
          DESCRIPTION="Sonar Quality Gate failed (${TIER}, required)"
        fi
      else
        if ! curl -sf -u "${SONAR_TOKEN}:" \
          "${SCAN_URL}/api/qualitygates/project_status?projectKey=${PROJECT_KEY}" \
          | grep -q '"status":"OK"'; then
          DESCRIPTION="Sonar Quality Gate failed (${TIER}, optional — pipeline continues)"
        fi
      fi
      curl -sf --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --data "state=${STATUS}" \
        --data "name=sonarqube/quality-gate" \
        --data-urlencode "description=${DESCRIPTION}" \
        --data-urlencode "target_url=${DASHBOARD}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/statuses/${CI_COMMIT_SHA}" || true
      if [ "$STATUS" = "failed" ]; then
        echo "Sonar Quality Gate failed and tier ${TIER} requires a passing gate."
        exit 1
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH'

sonar:scan:
  extends: .sonar-scan
  allow_failure: false

# Advisory on Free/CE; do not block deploy when the scanner cannot reach the image.
container_scanning:
  allow_failure: true

# =============================================================================
# .deploy-helm — base hidden job for all environment deployments.
#
# Writes KUBECONFIG_B64 to a temp file, then runs:
#   helm upgrade --install <release> <chart-repo>/dsoaas-app
#     --version $CHART_VERSION
#     --namespace $KUBE_NAMESPACE
#     --set image.repository=$CI_REGISTRY_IMAGE
#     --set image.tag=$CI_COMMIT_SHORT_SHA
#     --set ingress.host=$APP_HOST
#     --set project.path=$VAULT_PROJECT_PATH
#     --set project.env=<env>
#     [--values chart-values.yaml if present]
# =============================================================================
.deploy-helm:
  stage: deploy
  image:
    name: alpine/helm:3.17.3
    entrypoint: [""]
  before_script:
    - apk add --no-cache curl jq bash kubectl
    # RUNTIME env profiles are injected into pods via Vault + ExternalSecret, not CI shell.
    # Write kubeconfig from base64-encoded CI variable
    - mkdir -p /tmp/kube
    - echo "${KUBECONFIG_B64}" | base64 -d > /tmp/kube/config
    - chmod 600 /tmp/kube/config
    - export KUBECONFIG=/tmp/kube/config
    # CHART_REGISTRY_USER / CHART_REGISTRY_PASSWORD: instance CI variables (deploy token on auto-devops-chart).
    - |
      set -eu
      CHART_REGISTRY_HOST="${CHART_REGISTRY_HOST:-gitlab:5000}"
      if [ -z "${CHART_REGISTRY_PLAIN_HTTP:-}" ] || [ "${CHART_REGISTRY_PLAIN_HTTP}" = "auto" ]; then
        case "${CHART_REGISTRY_HOST}" in
          gitlab:5000 | gitlab) CHART_REGISTRY_PLAIN_HTTP=true ;;
          *) CHART_REGISTRY_PLAIN_HTTP=false ;;
        esac
      fi
      export CHART_OCI_REF="oci://${CHART_REGISTRY_HOST}/system/devsecops-platform/configs/auto-devops-chart/dsoaas-app"
      HELM_PLAIN_HTTP_FLAG=""
      HELM_LOGIN_EXTRA=""
      CHART_REGISTRY_HOST_GATEWAY_MAPPED=0
      if [ "${CHART_REGISTRY_PLAIN_HTTP}" = "true" ]; then
        HELM_PLAIN_HTTP_FLAG="--plain-http"
        HELM_LOGIN_EXTRA="--insecure"
      fi
      # External runners on the Docker host cannot hairpin to the public registry URL.
      # Map the registry hostname to host.docker.internal (same effect as runner extra_hosts).
      if [ "${CHART_REGISTRY_HOST}" != "gitlab:5000" ] && [ "${CHART_REGISTRY_HOST}" != "gitlab" ]; then
        if command -v getent >/dev/null 2>&1 && getent ahostsv4 host.docker.internal >/dev/null 2>&1; then
          _gw="$(getent ahostsv4 host.docker.internal | awk '{print $1; exit}')"
          echo "${_gw} ${CHART_REGISTRY_HOST}" >> /etc/hosts
          CHART_REGISTRY_HOST_GATEWAY_MAPPED=1
          echo "Mapped ${CHART_REGISTRY_HOST} -> host.docker.internal (${_gw})"
        fi
      fi
      if [ "${CHART_REGISTRY_HOST_GATEWAY_MAPPED}" = "1" ] && [ -z "${HELM_LOGIN_EXTRA}" ]; then
        HELM_LOGIN_EXTRA="--insecure"
      fi
      export HELM_PLAIN_HTTP_FLAG HELM_LOGIN_EXTRA CHART_REGISTRY_HOST_GATEWAY_MAPPED
      HELM_LOGIN_HOST="${CHART_REGISTRY_HOST}"
      case "${HELM_LOGIN_HOST}" in
        http://*|https://*) ;;
        gitlab:5000 | gitlab)
          HELM_LOGIN_HOST="http://${HELM_LOGIN_HOST}"
          ;;
        *)
          if [ "${CHART_REGISTRY_PLAIN_HTTP}" = "true" ]; then
            HELM_LOGIN_HOST="http://${HELM_LOGIN_HOST}"
          else
            HELM_LOGIN_HOST="https://${HELM_LOGIN_HOST}"
          fi
          ;;
      esac
      echo "Helm chart registry: ${CHART_REGISTRY_HOST} (login=${HELM_LOGIN_HOST}, oci=${CHART_OCI_REF}, plain_http=${CHART_REGISTRY_PLAIN_HTTP})"
      echo "${CHART_REGISTRY_PASSWORD}" | helm registry login "${HELM_LOGIN_HOST}" \
        --username "${CHART_REGISTRY_USER}" --password-stdin ${HELM_LOGIN_EXTRA}
    # Create / refresh a Kubernetes docker-registry pull secret so the cluster can
    # pull the project's image from the private GitLab registry.  The CI job token
    # (CI_REGISTRY_USER / CI_REGISTRY_PASSWORD) is valid for the duration of the
    # job and is sufficient to seed the local image cache on the first pull.
    # Subsequent runs use the cached image (imagePullPolicy=IfNotPresent) so they
    # are unaffected by token expiry.
    - |
      kubectl create secret docker-registry gitlab-registry-secret \
        --docker-server="${CI_REGISTRY}" \
        --docker-username="${CI_REGISTRY_USER}" \
        --docker-password="${CI_REGISTRY_PASSWORD}" \
        --namespace="${KUBE_NAMESPACE:-$DEPLOY_ENV}" \
        --dry-run=client -o yaml | kubectl apply -f -
  script:
    - |
      # Pre-flight: if a previous run left the release in a pending-* state
      # (pending-install / pending-upgrade / pending-rollback), helm upgrade
      # refuses to proceed.  Roll back to the last good revision so the next
      # upgrade can start cleanly.
      RELEASE_STATUS=$(helm status "${CI_PROJECT_NAME}" \
        --namespace "${KUBE_NAMESPACE:-$DEPLOY_ENV}" 2>/dev/null | grep "^STATUS:" | awk '{print $2}' || true)
      if echo "${RELEASE_STATUS}" | grep -qE "^pending-"; then
        echo "Release ${CI_PROJECT_NAME} is stuck in ${RELEASE_STATUS}; rolling back..."
        helm rollback "${CI_PROJECT_NAME}" 0 \
          --namespace "${KUBE_NAMESPACE:-$DEPLOY_ENV}" \
          --wait || helm uninstall "${CI_PROJECT_NAME}" \
          --namespace "${KUBE_NAMESPACE:-$DEPLOY_ENV}" || true
      fi
    - |
      EXTRA_VALUES=""
      if [ -f chart-values.yaml ]; then
        EXTRA_VALUES="--values chart-values.yaml"
      fi
      # Fall back to DEPLOY_ENV if KUBE_NAMESPACE is not env-scoped by the API,
      # so the deploy always lands in the correct namespace.
      helm upgrade --install "${CI_PROJECT_NAME}" "${CHART_OCI_REF}" \
        --version "${CHART_VERSION}" ${HELM_PLAIN_HTTP_FLAG} \
        --namespace "${KUBE_NAMESPACE:-$DEPLOY_ENV}" \
        --set image.repository="${CI_REGISTRY_IMAGE}" \
        --set image.tag="${CI_COMMIT_SHORT_SHA}" \
        --set ingress.host="${APP_HOST}" \
        --set project.path="${VAULT_PROJECT_PATH}" \
        --set project.env="${DEPLOY_ENV}" \
        --set "imagePullSecrets[0].name=gitlab-registry-secret" \
        --atomic \
        --timeout 5m \
        ${EXTRA_VALUES} \
        ${EXTRA_HELM_ARGS:-}
    - echo "Deployed ${CI_PROJECT_NAME} to ${DEPLOY_ENV} at https://${APP_HOST}"
  after_script:
    - rm -f /tmp/kube/config

# =============================================================================
# Concrete deploy jobs
# =============================================================================
deploy:dev:
  extends: .deploy-helm
  variables:
    DEPLOY_ENV: dev
  environment:
    name: dev
    url: https://$APP_HOST
  rules:
    - if: '$DEPLOY_DEV_REF == "none"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $DEPLOY_DEV_REF'
      when: on_success

deploy:stg:
  extends: .deploy-helm
  variables:
    DEPLOY_ENV: stg
  environment:
    name: stg
    url: https://$APP_HOST
  rules:
    - if: '$DEPLOY_STG_REF == "none"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $DEPLOY_STG_REF'
      when: on_success

deploy:prod:
  extends: .deploy-helm
  variables:
    DEPLOY_ENV: prod
  environment:
    name: prod
    url: https://$APP_HOST
  rules:
    - if: '$DEPLOY_PROD_REF == "none"'
      when: never
    - if: '$CI_COMMIT_BRANCH == $DEPLOY_PROD_REF'
      when: manual
      allow_failure: false
