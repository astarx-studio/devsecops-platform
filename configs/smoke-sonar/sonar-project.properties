# DSOaaS smoke-sonar — SonarQube analysis configuration.
# The platform pipeline template sets sonar.projectKey and sonar.projectName automatically.
sonar.sources=.
sonar.exclusions=**/node_modules/**,.dsoaas/**,coverage/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Use a writable directory under /tmp so the non-root sonar-scanner-cli can create
# its working directory even when the CI workspace is owned by root.
sonar.working.directory=/tmp/scannerwork
