# DSOaaS smoke-mono — SonarQube analysis configuration.
# The platform pipeline template sets sonar.projectKey and sonar.projectName from
# CI_PROJECT_PATH_SLUG and CI_COMMIT_REF_SLUG automatically when
# sonar-project.properties is present without those keys.
sonar.sources=.
sonar.exclusions=**/node_modules/**,.dsoaas/**
# Use a writable directory under /tmp so the non-root sonar-scanner-cli can create
# its working directory even when the CI workspace is owned by root.
sonar.working.directory=/tmp/scannerwork
