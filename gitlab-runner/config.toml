# ==========================================================================
# GitLab Runner — Reference Configuration
# ==========================================================================
# This file is NOT mounted directly into the runner container.
# The runner auto-registers with GitLab on first start and generates its
# own config.toml in .vols/gitlab-runner/config/.
#
# This file is kept as a reference for the expected configuration.
# The actual registration is done via `gitlab-runner register` with these
# equivalent settings (see docker-compose.yml entrypoint).
# ==========================================================================

concurrent = 4
check_interval = 0
shutdown_timeout = 0

[session_server]
  session_timeout = 1800

[[runners]]
  name = "docker-runner-1"
  url = "http://gitlab"
  token = "<auto-generated-during-registration>"
  executor = "docker"
  clone_url = "http://gitlab"
  [runners.docker]
    tls_verify = false
    image = "docker:latest"
    privileged = true
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    volumes = ["/cache", "/certs/client"]
    shm_size = 0
    # network_mode must match DOCKER_NETWORK in .env (set during runner registration)
    network_mode = "devops-network"
    pull_policy = ["always"]
  [runners.cache]
    Type = "local"
