services:
  app:
    build: .
    container_name: ${PROJECT_NAME:-nestjs-app}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - devops-network

networks:
  devops-network:
    name: ${DOCKER_NETWORK:-devops-network}
    external: true
